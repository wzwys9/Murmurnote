name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HAS_RELEASE_SIGNING: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore release keystore
        if: env.HAS_RELEASE_SIGNING == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/murmurnote-release.jks"

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/murmurnote-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: Murmurnote-arm64-v8a-release-apk
          path: app/build/outputs/apk/release/app-arm64-v8a-release.apk
          if-no-files-found: error

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: Murmurnote-armeabi-v7a-release-apk
          path: app/build/outputs/apk/release/app-armeabi-v7a-release.apk
          if-no-files-found: error

      - name: Upload x86 APK
        uses: actions/upload-artifact@v4
        with:
          name: Murmurnote-x86-release-apk
          path: app/build/outputs/apk/release/app-x86-release.apk
          if-no-files-found: error

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: Murmurnote-x86_64-release-apk
          path: app/build/outputs/apk/release/app-x86_64-release.apk
          if-no-files-found: error

      - name: Prepare release assets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/release/app-arm64-v8a-release.apk "release-assets/Murmurnote-${GITHUB_REF_NAME}-arm64-v8a.apk"
          cp app/build/outputs/apk/release/app-armeabi-v7a-release.apk "release-assets/Murmurnote-${GITHUB_REF_NAME}-armeabi-v7a.apk"
          cp app/build/outputs/apk/release/app-x86-release.apk "release-assets/Murmurnote-${GITHUB_REF_NAME}-x86.apk"
          cp app/build/outputs/apk/release/app-x86_64-release.apk "release-assets/Murmurnote-${GITHUB_REF_NAME}-x86_64.apk"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/*.apk \
            --title "Murmurnote ${GITHUB_REF_NAME}" \
            --notes "Signed release APKs for Murmurnote ${GITHUB_REF_NAME}."
