name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HAS_RELEASE_SIGNING: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore release keystore
        if: env.HAS_RELEASE_SIGNING == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/murmurnote-release.jks"

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/murmurnote-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: Murmurnote-arm64-v8a-release-apk
          path: app/build/outputs/apk/release/app-arm64-v8a-release.apk
          if-no-files-found: error

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: Murmurnote-armeabi-v7a-release-apk
          path: app/build/outputs/apk/release/app-armeabi-v7a-release.apk
          if-no-files-found: error

      - name: Upload x86 APK
        uses: actions/upload-artifact@v4
        with:
          name: Murmurnote-x86-release-apk
          path: app/build/outputs/apk/release/app-x86-release.apk
          if-no-files-found: error

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: Murmurnote-x86_64-release-apk
          path: app/build/outputs/apk/release/app-x86_64-release.apk
          if-no-files-found: error
